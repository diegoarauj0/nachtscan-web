services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    image: nachtscan-server
    build:
      context: ./server
      dockerfile: Dockerfile
    pull_policy: never
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  client:
    image: nachtscan-client
    build:
      context: ./client
      dockerfile: Dockerfile
    pull_policy: never
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  redis-data: